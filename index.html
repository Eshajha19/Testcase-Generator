<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Testcase-Generator</title>
    <style>
      :root {
        --bg: #0b1220;
        --card: rgba(255, 255, 255, 0.06);
        --card-border: rgba(255, 255, 255, 0.12);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.7);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background: radial-gradient(1200px 600px at 20% 0%, #172a55 0%, var(--bg) 55%),
          radial-gradient(900px 500px at 90% 10%, #1a3a6a 0%, transparent 60%),
          var(--bg);
        color: var(--text);
      }

      .wrap {
        min-height: 100%;
        padding: 18px;
        display: flex;
        align-items: stretch;
        justify-content: center;
      }

      .card {
        width: 100%;
        max-width: 1200px;
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
        display: flex;
        flex-direction: column;
      }

      .header {
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.06) 0%,
          rgba(255, 255, 255, 0.03) 100%
        );
      }

      .logo {
        width: 28px;
        height: 28px;
        border-radius: 10px;
        background: conic-gradient(from 180deg, #60a5fa, #34d399, #fbbf24, #a78bfa, #60a5fa);
        box-shadow: 0 10px 30px rgba(96, 165, 250, 0.25);
      }

      .title {
        font-weight: 700;
        letter-spacing: 0.2px;
      }

      .subtitle {
        margin-left: auto;
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
      }

      .content {
        flex: 1;
        min-height: 700px;
      }

      iframe {
        width: 100%;
        height: 100%;
        min-height: 700px;
        border: 0;
        display: block;
        background: #0a0f1e;
      }

      @media (max-width: 640px) {
        .wrap {
          padding: 12px;
        }
        .subtitle {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="card">
        <div class="header">
          <div class="logo" aria-hidden="true"></div>
          <div class="title">Testcase-Generator</div>
          <div class="subtitle">AI test case generation</div>
        </div>
        <div class="content">
          <iframe
            src="https://chatbot.getmindpal.com/ai-test-case-generation-agent-ahk"
            allow="clipboard-read; clipboard-write; microphone"
            referrerpolicy="strict-origin-when-cross-origin"
          ></iframe>
        </div>
      </div>
    </div>
  </body>
</html>
